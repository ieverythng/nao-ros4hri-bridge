/dialogue_manager:
  ros__parameters:
    input_speech_topic: "/humans/voices/anonymous_speaker/speech"
    user_text_topic: "/chatbot/user_text"
    assistant_text_topic: "/chatbot/assistant_text"
    intent_topic: "/chatbot/intent"
    dialogue_state_topic: "/chatbot/dialogue_state"
    naoqi_speech_topic: "/speech"
    use_say_skill: true
    say_skill_action: "/skill/say"
    say_skill_language: "en-US"
    say_skill_volume: 1.0
    say_skill_dispatch_wait_sec: 0.8
    also_publish_speech_topic: true
    fallback_publish_speech_topic: true
    reply_prefix: ""
    dedupe_window_sec: 0.8
    accept_incremental_speech: false
    ignore_user_speech_while_busy: true
    user_turn_holdoff_sec: 0.6
    user_turn_min_chars: 2
    user_turn_min_words: 1
